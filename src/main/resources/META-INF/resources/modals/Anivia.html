<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>애니비아 상세</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- LOL 스타일 커스텀 -->
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Anivia.png"
                    class="img-fluid rounded shadow-lg" alt="애니비아" style="max-height: 480px; object-fit: contain;">

                <div class="mt-3">
                    <h3 class="mb-1">애니비아 (Anivia)</h3>
                    <p class="text-muted fs-5">마법사 / 난이도: 상</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 환생</li>
                    <li class="list-group-item">Q: 서리와 얼음</li>
                    <li class="list-group-item">W: 수정화</li>
                    <li class="list-group-item">E: 동상</li>
                    <li class="list-group-item">R: 빙하 폭풍</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    애니비아는 고대의 빙하에서 태어난 정령으로, 프렐요드의 수호자다.
                    그녀는 생명과 죽음을 반복하며 혹독한 겨울 속에서 희망의 불씨를 지키고자 한다.
                    얼음과 바람을 다루는 강력한 힘으로 프렐요드를 위협하는 존재들에 맞선다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
