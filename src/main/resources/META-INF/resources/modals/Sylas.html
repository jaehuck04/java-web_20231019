<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사일러스 상세</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- LOL 스타일 커스텀 -->
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Sylas.png"
                    class="img-fluid rounded shadow-lg" alt="사일러스"
                    style="max-height: 480px; object-fit: contain; padding: 25px;">

                <div class="mt-3">
                    <h3 class="mb-1">사일러스 (Sylas)</h3>
                    <p class="text-muted fs-5">전사 / 난이도: 상</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 페트리사이트 폭발</li>
                    <li class="list-group-item">Q: 사슬 채찍</li>
                    <li class="list-group-item">W: 국왕시해자</li>
                    <li class="list-group-item">E: 도주/억압</li>
                    <li class="list-group-item">R: 강탈</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    사슬에 묶여 자라난 사일러스는 마법을 억압하는 체계에 반기를 들고 혁명을 일으킨 인물이다.
                    그는 다른 이들의 마법을 훔쳐 사용하는 능력을 지녔으며,
                    억압받는 자들을 해방시키기 위해 끝없는 투쟁을 이어간다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
