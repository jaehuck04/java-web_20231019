<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쓰레쉬 상세</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- LOL 스타일 커스텀 -->
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Thresh.png"
                    class="img-fluid rounded shadow-lg" alt="쓰레쉬"
                    style="max-height: 480px; object-fit: contain; padding: 25px;">

                <div class="mt-3">
                    <h3 class="mb-1">쓰레쉬 (Thresh)</h3>
                    <p class="text-muted fs-5">서포터 / 난이도: 상</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 지옥살이</li>
                    <li class="list-group-item">Q: 사형 선고</li>
                    <li class="list-group-item">W: 검은 방패</li>
                    <li class="list-group-item">E: 휩쓸기</li>
                    <li class="list-group-item">R: 영혼 감옥</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    쓰레쉬는 그림자 군도의 잔혹한 간수로, 영혼을 수확하고 고문하는 데서 즐거움을 느낀다.
                    그의 사슬과 랜턴은 희생자의 영혼을 가두고, 끝없는 고통 속에 묶어두기 위한 도구이다.
                    그는 죽음조차 끝이 아닌 저주받은 존재로, 영혼을 수확하며 끝없는 공포를 퍼뜨린다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
