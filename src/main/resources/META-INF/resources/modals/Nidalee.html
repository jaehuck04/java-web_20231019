<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>니달리 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Nidalee.png"
                    class="img-fluid rounded shadow-lg" style="max-height: 480px; object-fit: contain;" alt="니달리">

                <div class="mt-3">
                    <h3 class="mb-1">니달리 (Nidalee)</h3>
                    <p class="text-muted fs-5">암살자 / 난이도: 상</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 수풀 배회</li>
                    <li class="list-group-item">Q: 창 투척 / 숨통 끊기</li>
                    <li class="list-group-item">W: 덫 설치 / 도약</li>
                    <li class="list-group-item">E: 원시의 울음 / 할퀴기</li>
                    <li class="list-group-item">R: 표범의 상</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    니달리는 정글에서 자라난 야생의 사냥꾼으로,
                    인간과 표범의 형태를 자유롭게 넘나드는 능력을 지녔다.
                    그녀는 뛰어난 추적 능력과 민첩함으로 적을 사냥하며,
                    자신의 영역을 침범하는 자들에게 무자비한 공격을 퍼붓는다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
