<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가렌 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Garen.png"
                    class="img-fluid rounded shadow-lg" style="max-height: 480px; object-fit: contain;" alt="가렌">

                <div class="mt-3">
                    <h3 class="mb-1">가렌 (Garen)</h3>
                    <p class="text-muted fs-5">전사 / 난이도: 하</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 인내심</li>
                    <li class="list-group-item">Q: 결정타</li>
                    <li class="list-group-item">W: 용기</li>
                    <li class="list-group-item">E: 심판</li>
                    <li class="list-group-item">R: 데마시아의 정의</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    가렌은 데마시아의 용맹한 전사로, 왕국을 지키기 위해 싸우는 데마시아의 힘 그 자체다.
                    그는 강한 신념과 정의감을 바탕으로 전장을 누비며,
                    적들에게 데마시아의 정의를 보여준다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
