<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다리우스 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Darius.png"
                    class="img-fluid rounded shadow-lg" alt="다리우스" style="max-height: 480px; object-fit: contain;">
                <div class="mt-3">
                    <h3 class="mb-1">다리우스 (Darius)</h3>
                    <p class="text-muted fs-5">전사 / 난이도: 중</p>
                </div>
            </div>

            <!-- 오른쪽 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 과다출혈</li>
                    <li class="list-group-item">Q: 학살</li>
                    <li class="list-group-item">W: 마비의 일격</li>
                    <li class="list-group-item">E: 포획</li>
                    <li class="list-group-item">R: 녹서스의 단두대</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    다리우스는 녹서스의 가장 강력한 장군으로,
                    압도적인 힘과 잔혹한 전투 방식으로 적들을 제압한다.
                    그는 녹서스의 힘을 상징하는 존재로 두려움의 대상이다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
