<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>징크스 상세</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- LOL 스타일 커스텀 -->
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Jinx.png"
                    class="img-fluid rounded shadow-lg" alt="징크스" style="max-height: 480px; object-fit: contain;">

                <div class="mt-3">
                    <h3 class="mb-1">징크스 (Jinx)</h3>
                    <p class="text-muted fs-5">원거리 딜러 / 난이도: 중</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 신난다!</li>
                    <li class="list-group-item">Q: 스위치!</li>
                    <li class="list-group-item">W: 고속 연사포</li>
                    <li class="list-group-item">E: 뻥이요!</li>
                    <li class="list-group-item">R: 초강력 초토화 로켓!</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    징크스는 혼돈과 파괴를 즐기는 자운 출신의 무법자로,
                    어디를 가든 폭발과 소동을 일으키며 도시를 뒤흔든다.
                    그녀는 규칙이나 질서를 싫어하며,
                    자신이 원하는 대로 세상을 뒤집어버리는 것을 즐긴다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
