<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브라이어 상세</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- LOL 스타일 커스텀 -->
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽: 이미지 + 기본 정보 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Briar.png"
                    class="img-fluid rounded shadow-lg" alt="브라이어" style="max-height: 480px; object-fit: contain;">

                <div class="mt-3">
                    <h3 class="mb-1">브라이어 (Briar)</h3>
                    <p class="text-muted fs-5">전사 / 난이도: 중</p>
                </div>
            </div>

            <!-- 오른쪽: 스킬 + 스토리 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 피의 광기</li>
                    <li class="list-group-item">Q: 도약</li>
                    <li class="list-group-item">W: 피의 격노</li>
                    <li class="list-group-item">E: 피의 장막</li>
                    <li class="list-group-item">R: 절규</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    브라이어는 녹서스에서 만들어진 실험체로, 통제되지 않는 피의 갈망을 지닌 존재다.
                    그녀는 자신의 본능과 싸우며 자유를 찾기 위해 방황하고 있으며,
                    억눌린 감정과 파괴적인 힘 사이에서 균형을 찾으려 한다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
