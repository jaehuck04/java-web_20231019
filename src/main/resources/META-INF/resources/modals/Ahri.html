<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아리 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Ahri.png"
                    class="img-fluid rounded shadow-lg" alt="아리" style="max-height: 480px; object-fit: contain;">
                <div class="mt-3">
                    <h3 class="mb-1">아리 (Ahri)</h3>
                    <p class="text-muted fs-5">마법사 / 난이도: 중</p>
                </div>
            </div>

            <!-- 오른쪽 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 정기 흡수</li>
                    <li class="list-group-item">Q: 현혹의 구슬</li>
                    <li class="list-group-item">W: 여우불</li>
                    <li class="list-group-item">E: 매혹</li>
                    <li class="list-group-item">R: 혼령 질주</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    아리는 인간의 감정을 조종하는 능력을 가진 구미호로,
                    자신의 정체성과 감정 사이에서 갈등하며 살아간다.
                    그녀는 마력을 통해 적을 유혹하고, 빠르게 전장을 누빈다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
