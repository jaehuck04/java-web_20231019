<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야스오 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0e17;
            color: white;
            padding: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
        }

        h3,
        h4 {
            color: #c8aa6e;
        }

        .text-muted {
            color: #a0a0a0 !important;
        }

        .list-group-item {
            background: transparent;
            border-color: #444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-4">

            <!-- 왼쪽 -->
            <div class="col-lg-5 text-center">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Yasuo.png"
                    class="img-fluid rounded shadow-lg" alt="야스오" style="max-height: 480px; object-fit: contain;">
                <div class="mt-3">
                    <h3 class="mb-1">야스오 (Yasuo)</h3>
                    <p class="text-muted fs-5">전사 / 난이도: 상</p>
                </div>
            </div>

            <!-- 오른쪽 -->
            <div class="col-lg-7">
                <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item">패시브: 의지</li>
                    <li class="list-group-item">Q: 강철 폭풍</li>
                    <li class="list-group-item">W: 바람 장막</li>
                    <li class="list-group-item">E: 질풍검</li>
                    <li class="list-group-item">R: 최후의 숨결</li>
                </ul>

                <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
                <p class="text-secondary lh-lg">
                    야스오는 바람을 다루는 검객으로, 억울한 누명을 쓰고 도망자의 삶을 살고 있다.
                    그는 자신의 명예를 되찾기 위해 방황하며, 바람과 함께 적들을 베어 넘긴다.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
